<app-auth-layout>
  <div class="w-full max-w-md">

    <h1 class="text-3xl font-bold text-gray-800">
      Create Account
    </h1>

    <p class="text-sm text-gray-500 mt-2 mb-6">
      Tell us more about you
    </p>

    <div class="grid grid-cols-2 gap-4">

      <app-input-component
        label="First Name"
        placeholder="Enter first name">
      </app-input-component>

      <app-input-component
        label="Last Name"
        placeholder="Enter last name">
      </app-input-component>

    </div>

    <div class="mt-4">
      <app-input-component
        label="Username"
        placeholder="Enter username">
      </app-input-component>
    </div>

    <div class="mt-4">
      <app-input-component
        label="Phone"
        placeholder="+20 xxx xxx xxxx">
      </app-input-component>
    </div>

    <div class="mt-8">
      <app-button label="Next"></app-button>
    </div>

  </div>
</app-auth-layout>
